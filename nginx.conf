events {
    worker_connections 1024;
}

http {
    # ── Cloudflare real-IP extraction ─────────────────────────────────────────
    # IPv4 ranges: https://www.cloudflare.com/ips-v4
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # IPv6 ranges
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    # Also trust cloudflared on loopback
    set_real_ip_from 127.0.0.1;
    real_ip_header CF-Connecting-IP;

    # Use Docker's internal DNS so upstream IPs are re-resolved after restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name tatooine.thewifijedi.com _;
        client_max_body_size 10M;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Content-Type-Options  nosniff always;
        add_header X-Frame-Options         SAMEORIGIN always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # ── Proxy to Flask/Gunicorn ──────────────────────────────────────────
        location / {
            set $mist_api http://mist-api:8000;
            proxy_pass         $mist_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header   CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header   CF-Ray $http_cf_ray;
            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
        }

        location /health {
            set $mist_api http://mist-api:8000;
            proxy_pass $mist_api;
            access_log off;
        }

        # SSE — disable buffering so insight events stream immediately
        location ~ ^/api/v1/orgs/[^/]+/insights/stream$ {
            set $mist_api http://mist-api:8000;
            proxy_pass         $mist_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Mist-Token $http_x_mist_token;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }
    }
}
