  "Content-Type": "application/json"

  const url = \`\${BASE_URL}\${path}\`;
  const options = { method, headers };
  if (body) options.body = JSON.stringify(body);

  if (!response.ok) {
    throw new Error(\`API error \${response.status}\`);
  }

        res.writeHead(200);
        res.end("OK");
      });
    }
  });
