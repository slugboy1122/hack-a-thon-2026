version: '3.8'

services:
  mist-api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mist-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mist-api
    networks:
      - mist-net

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://workflows.thewifijedi.com/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_LOG_LEVEL=info
      - GENERIC_TIMEZONE=America/Los_Angeles
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MIST_API_TOKEN=${MIST_API_TOKEN}
      - MIST_DEFAULT_ORG_ID=${MIST_ORG_ID}
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - mist-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    command: tunnel --no-autoupdate --protocol http2 --config /etc/cloudflared/config.yml run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
      - n8n

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mist_db
      POSTGRES_USER: mist
      POSTGRES_PASSWORD: mist
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mist -d mist_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mist-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mist-net

volumes:
  postgres-data:
  n8n-data:

networks:
  mist-net:
    driver: bridge
